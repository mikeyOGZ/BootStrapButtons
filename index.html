<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap Button Showcase</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

  <div class="container">
    <h1 class="text-center">Bootstrap Button Showcase</h1>
    <h1>Basic Button</h1>
    <a class="btn btn-primary mb-4" href="#" role="button">Click Me</a>
    <h1>Button Colors on Buttons</h1>
    <a class="btn btn-primary mb-4" href="#" role="button"></btn->btn-Primary</a>
    <a class="btn btn-secondary mb-4" href="#" role="button">btn-Secondary</a>
    <a class="btn btn-success mb-4" href="#" role="button">btn-Success</a>
    <a class="btn btn-danger mb-4" href="#" role="button">btn-Danger</a>
    <a class="btn btn-warning mb-4" href="#" role="button">btn-Warning</a>
    <a class="btn btn-info mb-4" href="#" role="button">btn-Info</a>
    <a class="btn btn-light mb-4" href="#" role="button">btn-Light</a>
    <a class="btn btn-dark mb-4" href="#" role="button">btn-Dark</a>
    <h1>Button Styles</h1>
    <a class="btn btn-primary mb-4" href="#" role="button"></btn->Solid Primary</a>
    <a class="btn btn-success mb-4" href="#" role="button">Solid Success</a>
    <a class="btn btn-danger mb-4" href="#" role="button">Solid Danger</a>
    <button type="button" class="btn btn-outline-primary mb-4"> Outline Primary</button>
    <button type="button" class="btn btn-outline-success mb-4">Outline Success</button>
    <button type="button" class="btn btn-outline-danger mb-4">Outline Danger</button>
    
   




  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
